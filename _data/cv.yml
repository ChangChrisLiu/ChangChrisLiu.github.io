- title: Research Experience
  type: time_table
  contents:
    - title: Graduate Research Assistant
      institution: Texas A&M University, Control and Robotics Lab
      year: Jan. 2024 - Present
      description:
        - title: Robotic Disassembly for End-of-Life Products
          contents:
            - "Implemented perception and disassembly sequence planning for various EoL desktops on UR5e using YOLO, GNN, and VLM"
            - "Designed the complete data collection pipeline (teleoperation, dual cameras at 30 Hz, phase-labeled episodes) for VLA training, collecting 500+ demonstrations across multiple product types"
            - "Collected and constructed a multimodal dataset of 20,000+ images for EoL desktops, covering computer vision, graph construction, and supporting LLM/VLM training"
            - "Proposed SELF-VLA, an agentic skill-based VLA framework that improves task success rate by over 40% compared to end-to-end VLA baselines"
        - title: RAISE - Robot-Assisted Sorting for EoL Phones
          contents:
            - "Developed the robotic manipulation workflow, including an automated YOLO-based sorting system (99%+ mAP) on UR5e. Collaboration with Idaho National Laboratory"
        - title: Additional Contributions
          contents:
            - "Built a distributed teleoperation system on the GELLO framework with ZMQ-based communication, dual-camera streaming (Intel RealSense D435i + Luxonis OAK-D Pro at 30Hz), and HOSAS joystick control"
            - "Developed real-time disassembly sequence planning using GNN and VLM for robotic e-waste disassembly"
            - "Contributed to precision 3D scanning of computer enclosures using high dynamic range fringe projection (published in Applied Optics)"
    - title: Graduate Research Assistant
      institution: University at Buffalo, SUNY, CAL-UB Lab
      year: Aug. 2019 - Apr. 2021
      description:
        - "Trained a Deep-ConvLSTM model that predicts manipulator collisions from raw images (95% accuracy) without an explicit dynamics model, enabling safer human-robot collaboration"
        - "Applied reinforcement learning techniques for collaborative robot path planning and safety-aware control"
        - "Developed a transfer learning framework for quadrotor propeller damage detection using audio signals, achieving 98% accuracy across 4 fault types"
        - "Set up, calibrated, and maintained laboratory equipment including Vicon motion capture system, UR5e manipulators, and drone platforms"

